openapi: 3.0.3
info:
  title: Atalaya Mobile API
  version: 0.1.0-phase1
  description: Minimum API contract for Atalaya-Mobile staging integration.
servers:
  - url: https://atalaya-predictor-staging.onrender.com
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      summary: Login for Atalaya-Mobile
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              stagingUser:
                value:
                  username: mobile_test@atalaya.local
                  password: AtalayaTest123!
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      summary: Logout current mobile session
      responses:
        '200':
          description: Logout accepted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    example: true
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/dashboard:
    get:
      summary: Fetch dashboard snapshot for Atalaya-Mobile
      responses:
        '200':
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardPayload'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/trends:
    get:
      summary: Fetch trend points for a variable tag
      parameters:
        - name: tag
          in: query
          required: true
          schema:
            type: string
          example: rpm
        - name: range
          in: query
          required: true
          schema:
            type: string
            enum: ['30m', '2h', '6h', 'm30', 'h2', 'h6']
          example: 30m
      responses:
        '200':
          description: Trend points
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendResponse'
        '400':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/alerts/{alertId}/attachments:
    get:
      summary: Fetch alert attachments
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
          example: kp-001
      responses:
        '200':
          description: Attachment list
          content:
            application/json:
              schema:
                type: object
                required: [attachments]
                properties:
                  attachments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attachment'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/v1/predictor:
    get:
      summary: Future special predictor chart data
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [hook_load, surface_torque, pump_pressure]
        - name: well
          in: query
          required: false
          schema:
            type: string
        - name: job
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Predictor chart data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PredictorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Unauthorized:
      description: Missing, invalid, or expired token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: mobile_test@atalaya.local
        password:
          type: string
          format: password
          example: AtalayaTest123!
    LoginResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 43200
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      properties:
        id:
          type: string
          example: mobile_test
        username:
          type: string
          example: mobile_test@atalaya.local
        role:
          type: string
          example: operator
    DashboardPayload:
      type: object
      required: [well, job, latestSampleAt, staleThresholdSeconds, variables, alerts]
      properties:
        well:
          type: string
          example: IXACHI-45
        job:
          type: string
          example: Monitoreo de pozo
        latestSampleAt:
          type: string
          format: date-time
        staleThresholdSeconds:
          type: integer
          example: 12
        variables:
          type: array
          items:
            $ref: '#/components/schemas/WellVariable'
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/AtalayaAlert'
    WellVariable:
      type: object
      required: [slot, label, tag, rawUnit, value, sampleAt, configured]
      properties:
        slot:
          type: integer
          example: 1
        label:
          type: string
          example: RPM
        tag:
          type: string
          example: rpm
        rawUnit:
          type: string
          example: rpm
        value:
          nullable: true
          oneOf:
            - type: number
            - type: string
        sampleAt:
          type: string
          nullable: true
          format: date-time
        configured:
          type: boolean
          example: true
    AtalayaAlert:
      type: object
      required: [id, description, severity, createdAt, attachmentsCount, attachments]
      properties:
        id:
          type: string
          example: kp-001
        description:
          type: string
        severity:
          type: string
          enum: [OK, ATTENTION, CRITICAL]
        createdAt:
          type: string
          format: date-time
        attachmentsCount:
          type: integer
          example: 0
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
    TrendResponse:
      type: object
      required: [points]
      properties:
        tag:
          type: string
          example: rpm
        range:
          type: string
          example: 30m
        points:
          type: array
          items:
            $ref: '#/components/schemas/TrendPoint'
    TrendPoint:
      type: object
      required: [timestamp, value]
      properties:
        timestamp:
          type: string
          format: date-time
        value:
          type: number
          example: 132.4
    Attachment:
      type: object
      required: [id, name, url, mimeType]
      properties:
        id:
          type: string
        name:
          type: string
        url:
          type: string
          format: uri
        mimeType:
          type: string
        sizeBytes:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
    PredictorResponse:
      type: object
      required: [type, title, unit, xAxisLabel, yAxisLabel, envelopes, warnLine, criticalLine, fieldDepths]
      properties:
        type:
          type: string
          enum: [hook_load, surface_torque, pump_pressure]
        title:
          type: string
        unit:
          type: string
        xAxisLabel:
          type: string
        yAxisLabel:
          type: string
        envelopes:
          type: array
          items:
            type: array
            items:
              $ref: '#/components/schemas/XYPoint'
        warnLine:
          type: array
          items:
            $ref: '#/components/schemas/XYPoint'
        criticalLine:
          type: array
          items:
            $ref: '#/components/schemas/XYPoint'
        fieldDepths:
          type: array
          items:
            type: number
        generatedAt:
          type: string
          format: date-time
    XYPoint:
      type: object
      required: [x, y]
      properties:
        x:
          type: number
        y:
          type: number
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
